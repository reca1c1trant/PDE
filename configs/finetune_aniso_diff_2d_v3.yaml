# Anisotropic Diffusion 2D LoRA Finetuning Configuration (V3 Model)
# Uses PDEModelV3 with Shared FFN Transformer + Neighborhood Attention
# Loss: BC (supervised anchor) + PDE (anisotropic diffusion residual, per-equation normalized)
# Doubly periodic domain, no velocity fields, 1 scalar channel
#
# PDE: u_t = div(A * grad(u))
#      u_t = A_xx*u_xx + (A_xy + A_yx)*u_xy + A_yy*u_yy
#      A = [[0.001, 0.0005], [0.0005, 0.002]]
# Domain: [0, 1)^2, 160x160, dt=0.1

model_name: aniso_diff_2d_lora_v3

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false

  pretrained_path: /home/msai/song0304/code/PDE/checkpoints_v4_2donly_postsmooth/best_tf.pt
  gradient_checkpointing: true

  freeze_encoder: false
  freeze_decoder: false

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 10000.0
  lambda_pde: 1

  # Save criterion: save_vrmse_weight * val_vrmse + save_pde_weight * val_pde
  save_vrmse_weight: 100
  save_pde_weight: 0

  eval_interval: 200
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/apebench_2d_aniso_diff.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 0

logging:
  project: pde-aniso-diff-2d-lora
  entity: null
  save_dir: ./checkpoints_aniso_diff_2d_lora_v3
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 160
  ny: 160
  Lx: 1.0
  Ly: 1.0
  dx: 0.00625    # 1/160
  dy: 0.00625
  dt: 0.1

  # Anisotropic diffusion tensor A
  A_xx: 0.001
  A_xy: 0.0005
  A_yx: 0.0005
  A_yy: 0.002

  # Per-equation normalization scales (from GT verification: mean RMS over 30 samples)
  eq_scales:
    aniso_diff: 2.1975e-02

  # Per-equation weights
  eq_weights:
    aniso_diff: 1.0
