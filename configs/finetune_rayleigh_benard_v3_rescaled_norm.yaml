# Rayleigh-Benard 2D LoRA Finetuning — ABLATION: Fixed Normalization
# eq_scales = GT RMS averaged over all space and time, no per-timestep
# Incompressible Boussinesq: continuity + buoyancy transport
# x periodic, y Dirichlet (wall), Ra=1e10, Pr=1

model_name: rayleigh_benard_lora_v3_rescaled_norm

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false

  pretrained_path: ./checkpoints_v4_2donly_postsmooth/best_tf.pt
  gradient_checkpointing: true

  freeze_encoder: false
  freeze_decoder: false

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 10000.0
  lambda_pde: 1.190
  bc_width: 16
  lambda_boundary: 1000.0

  save_vrmse_weight: 100
  save_pde_weight: 1

  eval_interval: 200
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true

dataset:
  path: /home/msai/song0304/code/PDE/data/finetune/rayleigh_benard_pr1.h5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 2

logging:
  project: pde-rayleigh-benard-lora
  entity: null
  save_dir: ./checkpoints_rayleigh_benard_lora_v3_rescaled_norm
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 512
  ny: 128
  Lx: 4.0
  Ly: 1.0
  dt: 0.25
  kappa: 1.0e-5
  skip_bl: 15

  # Fixed normalization: GT RMS averaged over all space and time
  eq_scales:
    continuity: 3.598
    buoyancy: 1.190

  eq_weights:
    continuity: 1.0
    buoyancy: 1.0
