# KP-II (Kadomtsev-Petviashvili) LoRA Finetuning Configuration (V3 Model)
# Uses PDEModelV3 with Shared FFN Transformer + Neighborhood Attention
# Loss: BC (supervised anchor) + PDE (KP-II expanded form, per-equation normalized)
# Periodic domain (approximately — line soliton crosses boundary), no velocity fields
#
# PDE: d/dx(u_t + 6u*u_x + u_xxx) + 3*u_yy = 0

model_name: kp2_2d_lora_v3_scratch

pde_type: kp2_2d

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false

  gradient_checkpointing: true



training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 10000.0
  lambda_pde: 1

  # Save criterion: save_vrmse_weight * val_vrmse + save_pde_weight * val_pde
  save_vrmse_weight: 100
  save_pde_weight: 0

  eval_interval: 200
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/kp2_2d.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 0

logging:
  project: pde-kp2-2d-lora
  entity: null
  save_dir: ./checkpoints_kp2_2d_lora_v3_scratch
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 256
  ny: 256
  dx: 0.078125        # 20/256
  dy: 0.078125        # 20/256
  dt: 0.01
  skip_boundary: 20

  # Per-equation normalization scales
  eq_scales:
    kp2_equation: 2.3025

  # Per-equation weights
  eq_weights:
    kp2_equation: 1.0
