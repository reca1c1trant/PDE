model_name: burgers_3d_apebench_rescaled_norm

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  patch_size_3d: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0
  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false
  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8
  na:
    base_kernel: 5
    base_kernel_3d: 2
  decoder:
    stem_channels: 256
    hidden_channels: 128
  vector_channels: 3
  scalar_channels: 15
  enable_1d: false
  enable_3d: true
  pretrained_path: ./checkpoints_v4_s_3d_with_best1-2d/best_tf.pt
  gradient_checkpointing: true
  freeze_encoder: false
  freeze_decoder: false
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [qkv, proj, gate_proj, up_proj, down_proj]

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 50
  min_lr: 1.0e-6
  grad_clip: 1.0
  lambda_bc: 10000.0
  lambda_pde: 6.980e-04
  bc_width: 1
  save_vrmse_weight: 100
  save_pde_weight: 0
  eval_interval: 75
  early_stopping_patience: 30
  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 32
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/burgers_3d_apebench.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.8
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 3

logging:
  project: pde-burgers-3d-apebench
  entity: null
  save_dir: ./checkpoints_burgers_3d_apebench_rescaled_norm
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 32
  Lx: 1.0
  dt: 1.0
  alpha_2: 2.4414e-4
  beta_1: 1.5625e-2
  eq_scales:
    u_momentum: 7.069e-04
    v_momentum: 6.980e-04
    w_momentum: 7.115e-04
  eq_weights:
    u_momentum: 1.0
    v_momentum: 1.0
    w_momentum: 1.0
