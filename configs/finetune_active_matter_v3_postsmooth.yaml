# Active Matter LoRA Finetuning (Postsmooth Decoder)
# V2 decoder + 5×5 post-smooth, no D tensor
# Loss: BC (supervised anchor) + PDE (continuity + concentration)
# Channels: Vx(0), Vy(1), concentration(3)

model_name: active_matter_lora_v3_postsmooth

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false

  pretrained_path: ./checkpoints_v4_2donly_postsmooth/best_tf.pt
  gradient_checkpointing: true

  freeze_encoder: false
  freeze_decoder: false

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 50
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 10000.0
  lambda_pde: 1.0
  lambda_boundary: 0.0

  # Save criterion: save_vrmse_weight * val_vrmse + save_pde_weight * val_pde
  save_vrmse_weight: 100
  save_pde_weight: 1

  eval_interval: 50
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true

dataset:
  path: /home/msai/song0304/code/PDE/data/finetune/active_matter_all.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 16
  vector_dim: 2

logging:
  project: pde-active-matter-lora
  entity: null
  save_dir: ./checkpoints_active_matter_lora_v3_postsmooth
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 256
  ny: 256
  Lx: 10.0
  Ly: 10.0
  dt: 0.25
  d_T: 0.05

  # Per-equation normalization scales (GT RMS from test_gt_pde_active_matter.py, 64 samples)
  eq_scales:
    continuity: 7.6243e-01
    concentration: 3.3094e-03
    Dxx: 1.0

  # Per-equation weights (D tensor excluded from data)
  eq_weights:
    continuity: 1.0
    concentration: 1.0
    Dxx: 0.0
