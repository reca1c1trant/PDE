# Gray-Scott Reaction-Diffusion LoRA Finetuning Configuration (V3 Model)
# Uses PDEModelV3 with Shared FFN Transformer + Neighborhood Attention
# Loss: BC (supervised anchor) + PDE (Gray-Scott equation residual, per-equation normalized)
# Doubly periodic domain, no velocity fields

model_name: gray_scott_lora_v3

model:
  # Must match pretrained V3s model architecture
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    version: 'v3'
    stem_channels: 256
    hidden_channels: 256
    use_skip: true
    cross_patch:
      enabled: true
      kernel_size: 3
      num_layers: 2

  vector_channels: 3
  scalar_channels: 15

  # Gray-Scott is 2D, no 1D/3D components
  enable_1d: false
  enable_3d: false

  # Pretrained V4 2D-only checkpoint (decoder v3: skip + cross-patch)
  pretrained_path: ./checkpoints_v4_2donly_dec_v3_round2/best_tf.pt
  gradient_checkpointing: true

  # Freeze options
  freeze_encoder: false
  freeze_decoder: false

  # LoRA configuration
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 100
  min_lr: 1.0e-6
  grad_clip: 1.0

  # Loss weights: BC (supervised) + PDE (physics), NO RMSE
  lambda_bc: 10000.0     # Boundary RMSE (supervised anchor, 4 edges)
  lambda_pde: 1.0        # PDE residual loss (per-equation normalized)

  # Save criterion: save_vrmse_weight * val_vrmse + save_pde_weight * val_pde
  save_vrmse_weight: 100
  save_pde_weight: 1

  eval_interval: 50
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 20
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/gray_scott_test.h5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 2
  vector_dim: 0              # No velocity fields

logging:
  project: pde-gray-scott-lora
  entity: null
  save_dir: ./checkpoints_gray_scott_lora_v4_bc1
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 128
  ny: 128
  dx: 0.015748031    # 2.0157 / 128
  dy: 0.015748031
  dt: 10.0
  F: 0.098
  k: 0.057
  D_A: 1.81e-5
  D_B: 1.39e-5

  # Per-equation normalization scales (GT RMS, from test_gt_pde_gray_scott.py)
  # TODO: run test_gt_pde_gray_scott.py to get actual values
  # eq_scales:
  #   A_equation: 1.0e-3    # placeholder
  #   B_equation: 1.0e-3    # placeholder

  # Per-timestep normalization scales (time-aware, from compute_gt_scales_per_t.py)
  # Uncomment to enable per-timestep normalization instead of fixed eq_scales
  # eq_scales_per_t_path: ./data/gt_scales/gray_scott_per_t.pt
