# Turbulent Radiative Layer 2D LoRA Finetuning (bc_width=16)
# Compressible Euler: mass + momentum conservation (no energy)
# x periodic, y open (Neumann), 6 tcool values (0.03~0.56), 48 samples
# Channels: Vx(0), Vy(1), density(7)=scalar[4], pressure(15)=scalar[12]
# Loss: BC (16-pixel border supervised) + PDE (mass + x-mom + y-mom, eq_scales normalized)

model_name: turbulent_radiative_2d_lora_v3_bcw16

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    version: 'v3'
    stem_channels: 256
    hidden_channels: 256
    use_skip: true
    cross_patch:
      enabled: true
      kernel_size: 3
      num_layers: 2

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false

  pretrained_path: ./checkpoints_v4_2donly_dec_v3_round2/best_tf.pt
  gradient_checkpointing: true

  freeze_encoder: false
  freeze_decoder: false

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 100
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 10000.0
  lambda_pde: 1
  bc_width: 16           # Boundary strip width = patch_size (full boundary patches)

  # Save criterion: save_vrmse_weight * val_vrmse + save_pde_weight * val_pde
  save_vrmse_weight: 100
  save_pde_weight: 1

  eval_interval: 75
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 6
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/turbulent_radiative_2d.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 2

logging:
  project: pde-turbulent-radiative-2d-lora
  entity: null
  save_dir: ./checkpoints_turbulent_radiative_2d_lora_v3_bcw16
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 128
  ny: 384
  Lx: 1.0
  Ly: 3.0
  dt: 1.597033
  skip_bl: 10

  # Per-equation normalization scales (GT RMS from test_gt_pde_turbulent_radiative_2d.py)
  eq_scales:
    mass: 15.3113
    x_momentum: 1.0841
    y_momentum: 1.1283

  eq_weights:
    mass: 1.0
    x_momentum: 1.0
    y_momentum: 1.0
