# 1D Advection LoRA Finetuning Configuration (V3 Model)
# Uses PDEModelV3 with Shared FFN Transformer + Neighborhood Attention
# Loss: BC (supervised anchor) + PDE (u_t + a*u_x = 0, per-sample a)
# Periodic domain, passive_tracer in scalar[11], vector_dim=0

model_name: advection_1d_lora_v3_rescaled_norm

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  patch_size_3d: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128

  vector_channels: 3
  scalar_channels: 15

  enable_1d: true
  enable_3d: true

  pretrained_path: ./checkpoints_v4_s_3d_with_best1-2d/best_tf.pt
  gradient_checkpointing: true

  freeze_encoder: false
  freeze_decoder: false

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 10000.0
  lambda_pde: 8.5932e-03
  bc_width: 16

  save_vrmse_weight: 100
  save_pde_weight: 0

  eval_interval: 200
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 20
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/advection_1d.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 0

logging:
  project: pde-advection-1d-lora
  entity: null
  save_dir: ./checkpoints_advection_1d_lora_v3_rescaled_norm
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 256
  Lx: 6.283185307     # 2*pi
  dx: 0.024544         # 2*pi/256
  dt: 0.01

  eq_scales:
    advection: 8.5932e-03

  eq_weights:
    advection: 1.0
