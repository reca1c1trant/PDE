# Rayleigh-Bénard 2D LoRA Finetuning — Postsmooth Decoder
# Same as finetune_rayleigh_benard_v3.yaml but using postsmooth checkpoint
# For A/B comparison: decoder v3 (skip+cross-patch) vs postsmooth (5×5 conv)

model_name: rayleigh_benard_lora_v3

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false

  pretrained_path: ./checkpoints_v4_2donly_postsmooth/best_tf.pt
  gradient_checkpointing: true

  freeze_encoder: false
  freeze_decoder: false

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 10000.0
  lambda_pde: 1

  # Save criterion: save_vrmse_weight * val_vrmse + save_pde_weight * val_pde
  save_vrmse_weight: 100
  save_pde_weight: 1

  eval_interval: 200
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 6
  num_workers: 4
  pin_memory: true

dataset:
  path: ./data/finetune/rayleigh_benard_pr1.h5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 2

logging:
  project: pde-rayleigh-benard-lora
  entity: null
  save_dir: ./checkpoints_rayleigh_benard_lora_v3_postsmooth
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 512
  ny: 128
  Lx: 4.0
  Ly: 1.0
  dt: 0.25
  kappa: 1.0e-5
  skip_bl: 15

  # Per-equation normalization scales (GT RMS from test_gt_pde_rb_eqscales.py)
  eq_scales:
    continuity: 3.598
    buoyancy: 1.190

  eq_weights:
    continuity: 1.0
    buoyancy: 1.0

  # Per-timestep normalization scales (optional, overrides eq_scales when present)
  eq_scales_per_t_path: ./data/gt_scales/rayleigh_benard_per_t.pt
