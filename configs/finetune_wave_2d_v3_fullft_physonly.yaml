# 2D Wave Equation LoRA Finetuning Configuration (V3 Model)
# PDE: u_tt = c^2(u_xx + u_yy), first-order system: u_t = w, w_t = c^2 nabla^2 u
# Loss: BC (supervised anchor) + PDE (wave equation residual, per-equation normalized)
# Periodic domain [0, 2pi]^2, no velocity fields, 2 scalar channels (u, w)

model_name: wave_2d_fullft_physonly
pde_type: wave_2d

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false

  pretrained_path: /home/msai/song0304/code/PDE/checkpoints_v4_2donly_postsmooth/best_tf.pt



training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 100000.0
  lambda_pde: 3.1883e-3

  # Save criterion: save_vrmse_weight * val_vrmse + save_pde_weight * val_pde
  save_vrmse_weight: 100
  save_pde_weight: 0

  eval_interval: 200
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/wave_2d.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 0

logging:
  project: pde-wave-2d-lora
  entity: null
  save_dir: ./checkpoints_wave_2d_fullft_physonly
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  dx: 0.024544         # 2*pi/256
  dy: 0.024544         # 2*pi/256
  dt: 0.01

  # Per-equation normalization scales
  eq_scales:
    u_equation: 3.1883e-03
    w_equation: 2.7350e-02

  # Per-equation weights
  eq_weights:
    u_equation: 1.0
    w_equation: 1.0
