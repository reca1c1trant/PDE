# taylor_green_2d — Supervised LoRA Finetuning (Full-Field RMSE, Upper Bound)
# Loss: RMSE on all valid channels. No BC, no PDE.

model_name: taylor_green_2d_supervised_lora
model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0
  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false
  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8
  na:
    base_kernel: 5
  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5
  vector_channels: 3
  scalar_channels: 15
  enable_1d: false
  enable_3d: false
  pretrained_path: /home/msai/song0304/code/PDE/checkpoints_v4_2donly_postsmooth/best_tf.pt
  gradient_checkpointing: true
  freeze_encoder: false
  freeze_decoder: false
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
    - qkv
    - proj
    - gate_proj
    - up_proj
    - down_proj
training:
  max_epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.01
  betas:
  - 0.9
  - 0.999
  warmup_steps: 200
  min_lr: 1.0e-06
  grad_clip: 1.0
  eval_interval: 200
  early_stopping_patience: 30
  mixed_precision: 'no'
  gradient_accumulation_steps: 1
dataloader:
  batch_size: 2
  num_workers: 4
  pin_memory: true
dataset:
  path: /scratch-share/SONG0304/finetune/taylor_green_2d.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 2
logging:
  project: pde-taylor-green-2d-supervised
  entity: null
  save_dir: ./checkpoints_taylor_green_2d_supervised_lora
  log_interval: 10
checkpoint:
  resume_from: null
