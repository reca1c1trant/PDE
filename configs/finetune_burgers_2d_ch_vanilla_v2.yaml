# Burgers 2D — Split-NS Orthogonal LoRA (from rescaled_norm checkpoint)
# Frozen enc/dec, load LoRA A,B from trained checkpoint
# Hyperparams match rescaled_norm baseline exactly

model_name: burgers_2d_ch_vanilla_v2
pde_type: burgers_2d_ch

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0
  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false
  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8
  na:
    base_kernel: 5
  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5
  vector_channels: 3
  scalar_channels: 15
  enable_1d: false
  enable_3d: false
  pretrained_path: /home/msai/song0304/code/PDE/checkpoints_v4_2donly_postsmooth/best_tf.pt
  gradient_checkpointing: true
  init_from: /home/msai/song0304/code/PDE/checkpoints_burgers_2d_ch_lora_v3_rescaled_norm/best_lora.pt
  freeze_encoder: true
  freeze_decoder: true
  lora:
    # vanilla LoRA
    r: 16
    dropout: 0.05
    alpha: 32
    
    target_modules: [qkv, proj, gate_proj, up_proj, down_proj]

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0
  lambda_bc: 10000.0
  lambda_pde: 2.346e-5
  save_vrmse_weight: 100
  save_pde_weight: 0
  eval_interval: 200
  early_stopping_patience: 30
  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/burgers_2d_ch.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 2

logging:
  project: pde-muon-lora
  entity: null
  save_dir: ./checkpoints_burgers_2d_ch_vanilla_v2
  log_interval: 10

physics:
  nx: 256
  ny: 256
  Lx: 6.283185307
  Ly: 6.283185307
  dt: 0.01
  eq_scales:
    u_momentum: 3.230e-05
    v_momentum: 2.346e-05
    irrotational: 1.0
  eq_weights:
    u_momentum: 1.0
    v_momentum: 1.0
    irrotational: 1.0
