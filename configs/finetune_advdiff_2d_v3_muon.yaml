# Advection-Diffusion 2D Muon-LoRA Finetuning
# Same as v3 but with Newton-Schulz orthogonalization in LoRA forward path
# G = BA, alpha = ||G||, M = NS(G), ΔW = alpha * M

model_name: advdiff_2d_muon_lora
pde_type: advdiff_2d

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false

  pretrained_path: /home/msai/song0304/code/PDE/checkpoints_v4_2donly_postsmooth/best_tf.pt
  gradient_checkpointing: true

  freeze_encoder: false
  freeze_decoder: false

  lora:
    r: 16
    dropout: 0.05
    ns_steps: 5
    init_scale: 0.01
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0

  lambda_bc: 10000.0
  lambda_pde: 4.753e-4

  save_vrmse_weight: 100
  save_pde_weight: 0

  eval_interval: 200
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304/finetune/advdiff_2d.hdf5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: null
  val_time_interval: 20
  vector_dim: 0

logging:
  project: pde-muon-lora
  entity: null
  save_dir: ./checkpoints_advdiff_2d_muon_lora
  log_interval: 10

physics:
  nx: 256
  ny: 256
  Lx: 6.283185307     # 2*pi
  Ly: 6.283185307     # 2*pi
  dx: 0.024544    # 2*pi/256
  dy: 0.024544
  dt: 0.01
  a: 1.0
  b: 0.5

  eq_scales:
    advdiff: 4.753e-04

  eq_weights:
    advdiff: 1.0
